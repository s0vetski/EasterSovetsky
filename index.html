<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пасхальный Сбор 2026</title>
    <style>
        * {
            user-select: none;
            touch-action: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Comic Neue', sans-serif;
            background: #87CEEB;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #a2d5f2 0%, #ffffff 100%);
            cursor: none;
            touch-action: none;
            will-change: transform;
        }
        body.event-ended canvas,
        body.event-ended #ui {
            display: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,200,0.8);
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 30px;
            color: #5d4037;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
            z-index: 25;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 768px) {
            #ui { font-size: 28px; top: 15px; left: 15px; padding: 4px 12px; }
        }
        .logo-container {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 20;
            pointer-events: none;
        }
        .logo-container img { width: 150px; height: auto; display: block; }
        @media (max-width: 768px) {
            .logo-container { top: 60px; left: 15px; }
            .logo-container img { width: 80px; }
        }
        .social-top {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,240,0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 15px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .social-top .label { font-size: 12px; font-weight: bold; color: #5d4037; margin-bottom: 5px; }
        .social-top .icons { display: flex; gap: 12px; justify-content: center; }
        .social-top .social-icon {
            display: inline-block;
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .social-top .social-icon img { width: 100%; height: 100%; object-fit: contain; }
        .social-top .social-icon:active { transform: scale(0.95); }
        @media (max-width: 768px) {
            .social-top { top: 80px; right: 15px; padding: 6px 12px; }
            .social-top .social-icon { width: 48px; height: 48px; }
        }
        .name-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .name-modal-content {
            background: linear-gradient(145deg, #fff9e6, #ffefc0);
            border-radius: 60px;
            padding: 30px 40px;
            text-align: center;
            max-width: 90vw;
            width: 360px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 3px solid #ffb347;
            position: relative;
        }
        .name-modal-content h2 { color: #c96f0e; margin-top: 0; font-size: 28px; }
        .name-modal-content p { font-size: 20px; font-weight: bold; margin: 15px 0; }
        .name-modal-content input {
            width: 80%;
            padding: 12px 20px;
            font-size: 20px;
            border-radius: 50px;
            border: 2px solid #ffb347;
            text-align: center;
            background: white;
            margin: 10px 0;
        }
        .name-modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .name-modal-btn {
            background: #ff8c42;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 0 #b45f1b;
        }
        .name-modal-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b45f1b; }
        .name-modal-btn.cancel { background: #aaa; box-shadow: 0 3px 0 #666; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #c96f0e; }
        
        #leaderboard-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6b3 100%);
            padding: 20px 25px;
            border-radius: 40px;
            text-align: center;
            display: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            min-width: 280px;
            max-width: 90vw;
            width: auto;
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 1000;
            border: 3px solid #ffb347;
            animation: bounceIn 0.5s ease-out forwards;
        }
        
        @media (max-width: 768px) {
            #leaderboard-screen {
                max-height: 90vh;
                padding: 15px 20px;
                width: 85vw;
            }
            #leaderboard-screen h1 {
                font-size: 1.5em;
                margin: 5px 0;
            }
            #leaderboard-screen .chick {
                font-size: 40px;
                margin: 5px 0;
            }
            .entry {
                font-size: 14px;
                padding: 8px 12px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        #top-list {
            max-height: 250px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 8px;
            margin: 10px 0;
            -webkit-overflow-scrolling: touch;
        }
        
        #top-list::-webkit-scrollbar {
            width: 5px;
        }
        
        #top-list::-webkit-scrollbar-track {
            background: #ffe0a3;
            border-radius: 10px;
        }
        
        #top-list::-webkit-scrollbar-thumb {
            background: #ff8c42;
            border-radius: 10px;
        }
        
        @keyframes bounceIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        #leaderboard-screen h1 { font-size: 2.5em; margin-top: 0; color: #c96f0e; text-shadow: 2px 2px 0 #ffe0a3; }
        #leaderboard-screen .chick { font-size: 60px; margin: 10px 0; }
        .entry {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 2px dotted #f7c56e;
            font-size: 20px;
            background: rgba(255,255,200,0.6);
            margin: 5px 0;
            border-radius: 40px;
        }
        .btn {
            background: #ff8c42;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 0 #b45f1b;
            transition: 0.05s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b45f1b; }
        .btn.hidden { display: none; }
        .floating-message {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 100;
            text-shadow: 1px 1px 0 white;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px); }
            100% { opacity: 0; transform: translateY(-80px); }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .cheat-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10000;
            text-align: center;
            animation: shake 0.5s;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(5deg); }
            75% { transform: translate(-50%, -50%) rotate(-5deg); }
        }
        
        @media (max-width: 768px) {
            .floating-message {
                font-size: 20px !important;
                animation: floatUp 0.5s ease-out forwards !important;
            }
        }
    </style>
</head>
<body>
<div id="ui">🧺 Счёт: <span id="score">0</span></div>

<div class="logo-container">
    <img src="logo.png" alt="Советский">
</div>

<div class="social-top">
    <div class="label">📢 Наши соцсети</div>
    <div class="icons">
        <a href="https://t.me/sovetskiy_kzn" target="_blank" class="social-icon"><img src="tg.png" alt="Telegram"></a>
        <a href="https://vk.com/sovetskiykzn" target="_blank" class="social-icon"><img src="vk.png" alt="VK"></a>
        <a href="https://max.ru/id1660086060_gos" target="_blank" class="social-icon" id="maxLinkTop"><img src="max.png" alt="Max"></a>
    </div>
</div>

<div id="leaderboard-screen">
    <div class="chick">🐣🥚</div>
    <h1 id="leaderboard-title">ИГРА ОКОНЧЕНА!</h1>
    <div id="top-list">Загрузка ТОПа...</div>
    <button class="btn" id="reload-btn" onclick="location.reload()">🐥 ИГРАТЬ СНОВА</button>
</div>

<canvas id="game"></canvas>
<div id="toast" class="toast">✅ Текст скопирован!</div>

<script>
    // ========== НАСТРОЙКИ ВАШЕГО CLOUDFLARE WORKER ==========
    const BACKEND_URL = 'https://eastersov.acctest12312312.workers.dev';
    
    // ========== ДАТА ОКОНЧАНИЯ ИВЕНТА ==========
    const EVENT_END = new Date(2026, 3, 12, 19, 0, 0);
    function isEventActive() { return new Date() < EVENT_END; }

    // ========== ОПТИМИЗАЦИЯ ДЛЯ МОБИЛЬНЫХ ==========
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let realScore = 0;
    let gameActive = true;
    let basket = { x: 0, y: 0, w: 110, h: 122 };
    let basketImg = new Image();
    basketImg.src = "korzina.png";
    let basketLoaded = false;
    basketImg.onload = () => { basketLoaded = true; };
    let eggs = [];
    let spawnTimeout = null;
    let animationId = null;
    let slowUntil = 0;
    let finalPlayerName = "Аноним";
    
    // Защита счёта
    let cheatDetected = false;
    
    Object.defineProperty(window, 'score', {
        get: function() { return realScore; },
        set: function(value) {
            if (value > realScore + 10 && !cheatDetected) {
                banCheater("Попытка взлома счёта!");
                return;
            }
            realScore = value;
            document.getElementById('score').innerText = realScore;
        }
    });
    let score = 0;
    
    // ========== АНТИ-ЧИТ И АНТИ-БОТ ==========
    let gameStartTime = Date.now();
    let clickTimes = [];
    let mouseMovements = [];
    let totalCatches = 0;
    let goldenCatches = 0;
    let lastCatchTime = 0;
    
    // Сбор данных
    function collectBehaviorData() {
        document.addEventListener('click', () => {
            clickTimes.push(Date.now());
            if (clickTimes.length > 30) clickTimes.shift();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            mouseMovements.push({ x: e.clientX, y: e.clientY, time: Date.now() });
            if (mouseMovements.length > 200) mouseMovements.shift();
        });
    }
    
    // Проверка на человеческое поведение (ослабленная)
    function isHumanBehavior() {
        if (clickTimes.length > 10) {
            let intervals = [];
            for (let i = 1; i < clickTimes.length; i++) {
                intervals.push(clickTimes[i] - clickTimes[i-1]);
            }
            let avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
            if (avg < 30 && intervals.length > 5) return false;
        }
        
        let straightLines = 0;
        for (let i = 2; i < mouseMovements.length; i++) {
            let dx1 = mouseMovements[i-1].x - mouseMovements[i-2].x;
            let dy1 = mouseMovements[i-1].y - mouseMovements[i-2].y;
            let dx2 = mouseMovements[i].x - mouseMovements[i-1].x;
            let dy2 = mouseMovements[i].y - mouseMovements[i-1].y;
            
            if (Math.abs(dx1) > 50 && Math.abs(dy1) < 15 && 
                Math.abs(dx2) > 50 && Math.abs(dy2) < 15) {
                straightLines++;
            }
        }
        if (straightLines > 50) return false;
        
        return true;
    }
    
    function isHeadlessBrowser() {
        if (navigator.webdriver) return true;
        if (navigator.userAgent.includes("Headless")) return true;
        return false;
    }
    
    function banCheater(reason) {
        if (cheatDetected || !gameActive) return;
        cheatDetected = true;
        gameActive = false;
        
        if (spawnTimeout) clearTimeout(spawnTimeout);
        if (animationId) cancelAnimationFrame(animationId);
        
        const alertDiv = document.createElement('div');
        alertDiv.className = 'cheat-alert';
        alertDiv.innerHTML = `🚫 ЧИТ ОБНАРУЖЕН! 🚫<br><small>${reason}<br>Ваш результат не будет сохранён.</small>`;
        document.body.appendChild(alertDiv);
        
        setTimeout(() => {
            alertDiv.remove();
            location.reload();
        }, 3000);
    }
    
    // ========== РАБОТА С БЭКЕНДОМ ==========
    async function saveScoreToBackend(playerName, finalScore) {
        const gameDuration = Date.now() - gameStartTime;
        
        const minPossibleTime = finalScore * 40;
        if (gameDuration < minPossibleTime && finalScore > 50) {
            showToast("❌ Слишком быстро");
            return false;
        }
        
        if (!isHumanBehavior()) {
            showToast("❌ Подозрительное поведение");
            return false;
        }
        
        if (isHeadlessBrowser()) {
            showToast("❌ Браузер не поддерживается");
            return false;
        }
        
        if (totalCatches > 0) {
            const goldenPercent = (goldenCatches / totalCatches) * 100;
            if (goldenPercent > 70) {
                showToast("❌ Подозрительный результат");
                return false;
            }
        }
        
        const gameData = {
            score: finalScore,
            gameDuration: gameDuration,
            totalCatches: totalCatches,
            goldenCatches: goldenCatches,
            clickCount: clickTimes.length
        };
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/save-score`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    playerName: playerName,
                    score: finalScore,
                    gameData: gameData
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showToast('✅ Результат сохранён!');
                return true;
            } else {
                showToast('❌ ' + (result.message || 'Ошибка сохранения'));
                return false;
            }
        } catch (e) {
            console.error('Save error:', e);
            showToast('⚠️ Ошибка соединения с сервером');
            return false;
        }
    }
    
    async function getTopScoresFromBackend() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/top-scores`);
            const data = await response.json();
            
            if (data.success && data.top && data.top.length > 0) {
                let html = "<h3 style='margin:5px 0'>🏆 Топ игроков 🏆</h3>";
                data.top.forEach((entry, index) => {
                    html += `<div class="entry"><span>${index+1}. ${escapeHtml(entry.name)}</span><b>${entry.score}</b></div>`;
                });
                document.getElementById('top-list').innerHTML = html;
            } else {
                document.getElementById('top-list').innerHTML = "<div>Пока нет рекордов. Будь первым!</div>";
            }
            
            const fallbackScore = localStorage.getItem('fallbackScore');
            const fallbackName = localStorage.getItem('fallbackName');
            if (fallbackScore && fallbackName) {
                document.getElementById('top-list').innerHTML += `<div class="entry" style="background:#ffe0a3;"><span>📱 Локальный рекорд: ${escapeHtml(fallbackName)}</span><b>${fallbackScore}</b></div>`;
            }
        } catch (e) {
            console.error('Leaderboard error:', e);
            document.getElementById('top-list').innerHTML = "⚠️ Не удалось загрузить рейтинг";
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }
    
    // ========== МОДАЛЬНЫЕ ОКНА ==========
    function showNameModal(callback) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'name-modal';
        modalDiv.innerHTML = `
            <div class="name-modal-content">
                <div class="close-modal">&times;</div>
                <h2>🐰 Пасхальный сбор 🥚</h2>
                <p>Ваш счёт: ${score}</p>
                <input type="text" id="player-name-input" placeholder="Введите имя" maxlength="20" autocomplete="off">
                <div class="name-modal-buttons">
                    <button class="name-modal-btn" id="save-name-btn">Сохранить</button>
                    <button class="name-modal-btn cancel" id="cancel-name-btn">Пропустить</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const input = modalDiv.querySelector('#player-name-input');
        const saveBtn = modalDiv.querySelector('#save-name-btn');
        const cancelBtn = modalDiv.querySelector('#cancel-name-btn');
        const closeBtn = modalDiv.querySelector('.close-modal');
        const finish = (name) => { modalDiv.remove(); callback(name || null); };
        saveBtn.onclick = () => { let name = input.value.trim(); if (name === "") name = "Аноним"; finish(name); };
        cancelBtn.onclick = () => finish(null);
        closeBtn.onclick = () => finish(null);
        input.onkeypress = (e) => { if (e.key === 'Enter') { let name = input.value.trim(); if (name === "") name = "Аноним"; finish(name); } };
        setTimeout(() => input.focus(), 50);
    }
    
    function showLeaderboardOnly(title, showReloadButton = true) {
        document.getElementById('leaderboard-title').innerText = title;
        const reloadBtn = document.getElementById('reload-btn');
        if (showReloadButton) reloadBtn.classList.remove('hidden');
        else reloadBtn.classList.add('hidden');
        document.getElementById('leaderboard-screen').style.display = 'block';
        getTopScoresFromBackend();
    }
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    function getRandomEggType() {
        const r = Math.random();
        if (r < 0.7) return 'normal';
        if (r < 0.85) return 'golden';
        if (r < 0.95) return 'ice';
        return 'rotten';
    }
    
    function spawnEgg() {
        if (!gameActive || cheatDetected) return;
        
        if (isMobile && eggs.length > 12) return;
        
        const type = getRandomEggType();
        eggs.push({
            x: Math.random() * (canvas.width - 50) + 25,
            y: -50,
            baseSpeed: 3 + (score / 15),
            type: type,
        });
        spawnTimeout = setTimeout(spawnEgg, Math.max(400, 1100 - score * 15));
    }
    
    function applyCatchEffect(egg, index, eggX, eggY) {
        if (cheatDetected) return;
        
        totalCatches++;
        if (egg.type === 'golden') goldenCatches++;
        
        const now = Date.now();
        if (now - lastCatchTime < 15 && totalCatches > 10) {
            banCheater("Слишком частая поимка!");
            return;
        }
        lastCatchTime = now;
        
        let points = 0;
        let message = '';
        let color = '#4CAF50';
        
        switch(egg.type) {
            case 'golden': 
                points = 5;
                message = '+5 ✨';
                color = '#FFD700';
                break;
            case 'ice': 
                points = 0;
                slowUntil = Date.now() + 2000;
                message = '❄️ ЗАМЕДЛЕНИЕ ❄️';
                color = '#80D8FF';
                break;
            case 'rotten': 
                points = -1;
                message = '-1 💩';
                color = '#8B4513';
                break;
            default: 
                points = 1;
                message = '+1';
                color = '#4CAF50';
        }
        
        score += points;
        document.getElementById('score').innerText = score;
        
        setTimeout(() => {
            showFloatingMessage(message, eggX, eggY, color);
        }, 0);
        
        eggs.splice(index, 1);
    }
    
    function showFloatingMessage(text, x, y, color = '#ffaa00') {
        const div = document.createElement('div');
        div.className = 'floating-message';
        div.innerText = text;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.color = color;
        
        if (isMobile) {
            div.style.fontSize = '20px';
            div.style.fontWeight = 'bold';
        }
        
        document.body.appendChild(div);
        setTimeout(() => {
            if (div && div.remove) div.remove();
        }, 600);
    }
    
    async function gameOver() {
        if (!gameActive || cheatDetected) return;
        gameActive = false;
        if (spawnTimeout) clearTimeout(spawnTimeout);
        if (animationId) cancelAnimationFrame(animationId);
        canvas.style.cursor = 'auto';
        
        showNameModal(async (playerName) => {
            if (playerName && !cheatDetected) {
                finalPlayerName = playerName;
                await saveScoreToBackend(playerName, score);
            }
            showLeaderboardOnly("ИГРА ОКОНЧЕНА!", true);
        });
    }
    
    function draw() {
        if (!gameActive || cheatDetected) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#8bc34a';
        ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
        
        if (basketLoaded) {
            ctx.drawImage(basketImg, basket.x, basket.y, basket.w, basket.h);
        } else {
            ctx.fillStyle = '#795548';
            ctx.beginPath();
            ctx.roundRect(basket.x, basket.y, basket.w, basket.h, 10);
            ctx.fill();
        }
        
        const now = Date.now();
        const isSlow = now < slowUntil;
        const eggSize = 48;
        
        const eggImgNormal = new Image();
        const eggImgGolden = new Image();
        const eggImgIce = new Image();
        const eggImgRotten = new Image();
        eggImgNormal.src = "norm.png";
        eggImgGolden.src = "zolo.png";
        eggImgIce.src = "zamoroz.png";
        eggImgRotten.src = "kaka.png";
        
        for (let i = 0; i < eggs.length; i++) {
            const egg = eggs[i];
            let speed = egg.baseSpeed;
            if (isSlow) speed = egg.baseSpeed * 0.5;
            egg.y += speed;
            
            let img = null;
            if (egg.type === 'normal') img = eggImgNormal;
            else if (egg.type === 'golden') img = eggImgGolden;
            else if (egg.type === 'ice') img = eggImgIce;
            else if (egg.type === 'rotten') img = eggImgRotten;
            
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.drawImage(img, egg.x - eggSize/2, egg.y - eggSize/2, eggSize, eggSize);
            } else {
                let fallbackColor = '#ffaa00';
                if (egg.type === 'golden') fallbackColor = '#FFD700';
                else if (egg.type === 'ice') fallbackColor = '#80D8FF';
                else if (egg.type === 'rotten') fallbackColor = '#8B4513';
                ctx.fillStyle = fallbackColor;
                ctx.beginPath();
                ctx.ellipse(egg.x, egg.y, eggSize/2, eggSize/2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.stroke();
            }
            
            if (egg.y + eggSize/2 > basket.y && egg.x > basket.x && egg.x < basket.x + basket.w) {
                applyCatchEffect(egg, i, egg.x, egg.y);
                i--;
                continue;
            }
            if (egg.y + eggSize/2 > canvas.height) {
                if (egg.type === 'rotten') {
                    eggs.splice(i, 1);
                    i--;
                    continue;
                } else {
                    gameOver();
                    return;
                }
            }
        }
        animationId = requestAnimationFrame(draw);
    }
    
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x+r, y);
            this.lineTo(x+w-r, y);
            this.quadraticCurveTo(x+w, y, x+w, y+r);
            this.lineTo(x+w, y+h-r);
            this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            this.lineTo(x+r, y+h);
            this.quadraticCurveTo(x, y+h, x, y+h-r);
            this.lineTo(x, y+r);
            this.quadraticCurveTo(x, y, x+r, y);
            return this;
        };
    }
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        basket.w = Math.min(110, canvas.width / 3);
        basket.h = basket.w * (823 / 740);
        basket.y = canvas.height - basket.h - 15;
        if (basket.x + basket.w > canvas.width) basket.x = canvas.width - basket.w;
        if (basket.x < 0) basket.x = 0;
    }
    
    window.addEventListener('resize', () => { if (gameActive) { resize(); draw(); } });
    
    function handleMove(clientX) {
        if (!gameActive) return;
        let newX = clientX - basket.w / 2;
        newX = Math.min(Math.max(0, newX), canvas.width - basket.w);
        basket.x = newX;
    }
    
    window.addEventListener('mousemove', (e) => { if (gameActive) handleMove(e.clientX); });
    window.addEventListener('touchmove', (e) => { if (gameActive) { e.preventDefault(); handleMove(e.touches[0].clientX); } });
    window.addEventListener('touchstart', (e) => { if (gameActive) { e.preventDefault(); handleMove(e.touches[0].clientX); } });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // Запуск игры
    if (isEventActive()) {
        resize();
        collectBehaviorData();
        spawnEgg();
        animationId = requestAnimationFrame(draw);
        gameStartTime = Date.now();
    } else {
        document.body.classList.add('event-ended');
        canvas.style.pointerEvents = 'none';
        gameActive = false;
        showLeaderboardOnly("🥚 Пасхальный сбор завершён 🥚", false);
    }
</script>
</body>
